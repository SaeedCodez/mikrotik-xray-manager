<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FAF9F7">
  <title>Xray Manager</title>
  <link rel="stylesheet" href="/fonts/fonts.css">
  <link rel="stylesheet" href="/style.css">
  <script src="/vendor/lucide.js"></script>
  <script defer src="/app.js"></script>
  <script defer src="/vendor/alpine.min.js"></script>
</head>
<body>
<div class="app-shell" x-data="xrayApp()" x-cloak>

  <!-- ============ LOGIN ============ -->
  <template x-if="booted && !authenticated">
    <div class="login-wrap">
      <div class="login-inner">
        <span class="login-mark"><i data-lucide="waypoints" class="icon"></i></span>
        <div>
          <div class="gh-eyebrow" style="margin-bottom:10px">PROXY CONTROL</div>
          <h1 class="login-title">Xray Manager</h1>
          <p class="login-sub">Sign in to manage and switch between your proxies.</p>
        </div>
        <div class="field" style="margin-top:4px">
          <label class="field-label" for="pw">Password</label>
          <div class="field-box">
            <input id="pw" class="field-input" type="password" placeholder="Enter your password"
                   x-model="pw" @keydown.enter="login()">
          </div>
          <span class="field-helper">Use the password set in <code>APP_PASSWORD</code>.</span>
        </div>
        <div style="width:100%">
          <button class="btn btn-primary btn-lg btn-full" @click="login()">Unlock</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ============ APP ============ -->
  <template x-if="booted && authenticated">
    <div style="display:flex;flex-direction:column;flex:1;min-height:0">

      <!-- top bar -->
      <header class="app-header">
        <div class="brand">
          <span class="brand-mark"><i data-lucide="waypoints" class="icon"></i></span>
          <span class="brand-name">Xray Manager</span>
        </div>
        <div class="run-pill" :class="status.running ? 'is-running' : 'is-stopped'">
          <span class="run-dot"></span>
          <span x-text="runLabel"></span>
        </div>
      </header>

      <!-- panel region -->
      <div class="panel-region">

        <!-- ===== PROXIES ===== -->
        <div class="panel xscroll" x-show="tab==='proxies'">
          <div style="margin-bottom:10px">
            <div class="field-box">
              <span class="icon-left"><i data-lucide="search" class="icon"></i></span>
              <input class="field-input" placeholder="Search proxies" x-model="query">
            </div>
          </div>
          <div class="toolbar-2">
            <button class="btn btn-secondary btn-full" @click="testAll()">Test all</button>
            <button class="btn btn-primary btn-full" @click="openAddProxy()">Add proxy</button>
          </div>
          <div class="gh-eyebrow count-label" x-text="countLabel"></div>

          <div style="display:flex;flex-direction:column;gap:9px">
            <template x-for="p in filteredProxies" :key="p.id">
              <div class="proxy-card" :class="{ active: p.id === activeId }">
                <div class="proxy-head" role="button" @click="toggleExpand(p.id)">
                  <div style="min-width:0;flex:1">
                    <div class="proxy-title-row">
                      <span class="active-dot" x-show="p.id === activeId"></span>
                      <span class="proxy-name" x-text="p.name"></span>
                    </div>
                    <div class="proxy-sub">
                      <span class="proto-pill" x-text="(p.protocol || '').toUpperCase()"></span>
                      <span class="proxy-endpoint" x-text="endpoint(p)"></span>
                    </div>
                  </div>
                  <span class="testing-pill" x-show="p._testing">
                    <span class="spinner"></span> testing
                  </span>
                  <span x-show="!p._testing" class="lat-pill" :class="latInfo(p).cls" x-text="latInfo(p).text"></span>
                  <i data-lucide="chevron-down" class="chev" :class="{ open: expandedId === p.id }"></i>
                </div>

                <div class="proxy-detail" x-show="expandedId === p.id">
                  <div class="detail-rows">
                    <div class="detail-row"><span class="k">Address</span><span class="v" x-text="endpoint(p)"></span></div>
                    <div class="detail-row"><span class="k">Source</span><span class="v" x-text="proxySource(p)"></span></div>
                  </div>
                  <div class="detail-actions">
                    <button class="row-btn row-btn-primary" x-show="p.id !== activeId" @click="activate(p.id)">
                      <i data-lucide="check" class="icon"></i> Set active
                    </button>
                    <div class="active-chip" x-show="p.id === activeId">
                      <i data-lucide="check-circle-2" class="icon"></i> Active connection
                    </div>
                    <button class="row-btn row-btn-secondary" @click="testOne(p.id)">
                      <i data-lucide="zap" class="icon"></i> Test
                    </button>
                    <button class="row-btn row-btn-danger" aria-label="Delete proxy" @click="deleteProxy(p.id)">
                      <i data-lucide="trash-2" class="icon"></i>
                    </button>
                  </div>
                </div>
              </div>
            </template>
          </div>

          <div class="empty-state" x-show="filteredProxies.length === 0">
            <i data-lucide="search-x" class="icon"></i>
            <p style="margin:12px 0 0" x-text="query ? ('No proxies match “' + query + '”.') : 'No proxies yet — add one or refresh a subscription.'"></p>
          </div>
        </div>

        <!-- ===== SUBSCRIPTIONS ===== -->
        <div class="panel subs xscroll" x-show="tab==='subs'">
          <h2 class="section-head">Subscriptions</h2>
          <p class="section-lead">URLs that deliver a batch of proxies. Refresh to pull the latest.</p>
          <div class="toolbar-2" style="margin-bottom:16px">
            <button class="btn btn-secondary btn-full" @click="refreshAllSubs()">Refresh all</button>
            <button class="btn btn-primary btn-full" @click="openAddSub()">Add new</button>
          </div>

          <div style="display:flex;flex-direction:column;gap:11px">
            <template x-for="sub in subs" :key="sub.id">
              <div class="sub-card">
                <div class="sub-top">
                  <div style="min-width:0;flex:1">
                    <div class="sub-name" x-text="sub.name"></div>
                    <div class="sub-url" x-text="sub.url"></div>
                  </div>
                  <div class="sub-actions">
                    <span class="icon-btn spinning" x-show="sub._refreshing"><span class="spinner"></span></span>
                    <button class="icon-btn" x-show="!sub._refreshing" aria-label="Refresh subscription" @click="refreshSub(sub.id)">
                      <i data-lucide="refresh-cw" class="icon"></i>
                    </button>
                    <button class="icon-btn danger" aria-label="Delete subscription" @click="askDeleteSub(sub.id)">
                      <i data-lucide="trash-2" class="icon"></i>
                    </button>
                  </div>
                </div>
                <div class="sub-meta">
                  <i data-lucide="clock" class="icon"></i>
                  <span x-text="subMeta(sub)"></span>
                </div>
                <div class="sub-error" x-show="!!sub.error">
                  <i data-lucide="alert-triangle" class="icon"></i>
                  <span x-text="'Last refresh failed · ' + sub.error"></span>
                </div>
              </div>
            </template>
            <div class="empty-state" x-show="subs.length === 0">
              <i data-lucide="rss" class="icon"></i>
              <p style="margin:12px 0 0">No subscriptions yet — add a URL to pull proxies.</p>
            </div>
          </div>
        </div>

        <!-- ===== CONNECTION TEST ===== -->
        <div class="panel test xscroll" x-show="tab==='test'">
          <h2 class="section-head">Connection test</h2>
          <p class="section-lead">Send a request through the running Xray core and inspect the response.</p>

          <div class="field" style="margin-bottom:10px">
            <label class="field-label" for="testUrl">URL</label>
            <div class="field-box">
              <span class="icon-left"><i data-lucide="link" class="icon"></i></span>
              <input id="testUrl" class="field-input" placeholder="https://example.com"
                     x-model="conn.url" @keydown.enter="runConnTest()">
            </div>
          </div>
          <button class="btn btn-primary btn-lg btn-full" @click="runConnTest()" :disabled="conn.running">
            <span class="spinner" x-show="conn.running" style="width:16px;height:16px"></span>
            <i data-lucide="play" class="icon" x-show="!conn.running"></i>
            <span x-text="conn.running ? 'Testing…' : 'Test'"></span>
          </button>

          <!-- error state -->
          <div class="test-error" x-show="!!conn.error">
            <i data-lucide="alert-triangle" class="icon"></i>
            <span x-text="conn.error"></span>
          </div>

          <!-- result card -->
          <template x-if="conn.result">
            <div class="test-result">
              <!-- hero: latency + verdict -->
              <div class="test-hero" :class="conn.result.ok ? 'ok' : 'fail'">
                <div class="test-hero-main">
                  <span class="test-verdict-icon">
                    <i :data-lucide="conn.result.ok ? 'check-circle-2' : 'x-circle'" class="icon"></i>
                  </span>
                  <div style="min-width:0">
                    <div class="test-verdict" x-text="conn.result.ok ? 'Success' : (conn.result.status ? 'Failed' : 'No response')"></div>
                    <div class="test-via" x-show="!!conn.result.via" x-text="'via ' + conn.result.via"></div>
                  </div>
                </div>
                <div class="test-latency" :class="connLatInfo(conn.result.latency).cls">
                  <span class="test-latency-num" x-text="conn.result.latency"></span>
                  <span class="test-latency-unit">ms</span>
                </div>
              </div>

              <!-- request error (reached proxy but failed) -->
              <div class="test-inline-error" x-show="!!conn.result.error">
                <i data-lucide="alert-octagon" class="icon"></i>
                <span x-text="conn.result.error"></span>
              </div>

              <!-- stat grid -->
              <div class="test-grid" x-show="!conn.result.error">
                <div class="test-stat">
                  <div class="test-stat-k">Status</div>
                  <div class="test-stat-v">
                    <span class="code-pill" :class="statusClass(conn.result.status)"
                          x-text="conn.result.status + (conn.result.statusText ? ' ' + conn.result.statusText : '')"></span>
                  </div>
                </div>
                <div class="test-stat">
                  <div class="test-stat-k">Protocol</div>
                  <div class="test-stat-v mono" x-text="conn.result.proto || '—'"></div>
                </div>
                <div class="test-stat">
                  <div class="test-stat-k">Size</div>
                  <div class="test-stat-v mono" x-text="fmtBytes(conn.result.contentLength)"></div>
                </div>
                <div class="test-stat">
                  <div class="test-stat-k">Content-Type</div>
                  <div class="test-stat-v mono trunc" x-text="(conn.result.contentType || '—').split(';')[0]"></div>
                </div>
                <div class="test-stat" x-show="!!conn.result.server">
                  <div class="test-stat-k">Server</div>
                  <div class="test-stat-v mono trunc" x-text="conn.result.server"></div>
                </div>
                <div class="test-stat">
                  <div class="test-stat-k">Latency</div>
                  <div class="test-stat-v mono" x-text="conn.result.latency + ' ms'"></div>
                </div>
              </div>

              <!-- final URL -->
              <div class="test-url-row" x-show="!!conn.result.finalUrl">
                <span class="test-stat-k">URL</span>
                <span class="test-url mono" x-text="conn.result.finalUrl"></span>
              </div>

              <!-- headers -->
              <div class="test-headers" x-show="connHeaderRows.length">
                <button class="test-headers-toggle" @click="connHeadersOpen = !connHeadersOpen">
                  <i data-lucide="chevron-right" class="chev" :class="{ open: connHeadersOpen }"></i>
                  <span x-text="'Response headers (' + connHeaderRows.length + ')'"></span>
                </button>
                <div class="test-headers-body" x-show="connHeadersOpen">
                  <template x-for="h in connHeaderRows" :key="h.k">
                    <div class="hdr-row">
                      <span class="hdr-k" x-text="h.k"></span>
                      <span class="hdr-v" x-text="h.v"></span>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>

          <div class="empty-state" x-show="!conn.result && !conn.error && !conn.running">
            <i data-lucide="gauge" class="icon"></i>
            <p style="margin:12px 0 0">Enter a URL and tap Test to measure the real delay through your active proxy.</p>
          </div>
        </div>

        <!-- ===== ROUTING ===== -->
        <div class="panel routing xscroll" x-show="tab==='routing'">
          <div style="margin-bottom:10px">
            <h2 class="section-head">Routing Rules</h2>
            <p class="section-lead">Define which traffic goes direct or through the proxy.</p>
          </div>
          <div class="toolbar-2" style="margin-bottom:16px">
            <button class="btn btn-secondary btn-full" @click="openTemplates()">Load template</button>
            <button class="btn btn-primary btn-full" @click="openAddRule()">Add rule</button>
          </div>

          <div class="rules-list">
            <div class="rules-header" x-show="rules.length > 0">
              <div class="col-name">Name</div>
              <div class="col-type">Type</div>
              <div class="col-action">Action</div>
              <div class="col-priority">Priority</div>
              <div class="col-actions"></div>
            </div>

            <template x-for="r in rules" :key="r.id">
              <div class="rule-row" :class="{ disabled: !r.enabled }">
                <div class="col-name" x-text="r.name"></div>
                <div class="col-type" x-text="r.type"></div>
                <div class="col-action" :class="'action-' + r.action" x-text="r.action"></div>
                <div class="col-priority" x-text="r.priority"></div>
                <div class="col-actions">
                  <button class="row-btn row-btn-secondary" aria-label="Edit" @click="openEditRule(r.id)">✎</button>
                  <button class="row-btn row-btn-danger" aria-label="Delete" @click="deleteRule(r.id)">×</button>
                </div>
              </div>
            </template>
          </div>

          <div class="empty-state" x-show="rules.length === 0">
            <i data-lucide="git-branch" class="icon"></i>
            <p style="margin:12px 0 0">No routing rules yet. Add one to control traffic routing.</p>
          </div>
        </div>

        <!-- ===== STATUS ===== -->
        <div class="panel status xscroll" x-show="tab==='status'">
          <h2 class="section-head" style="margin-bottom:14px">Status</h2>

          <!-- process -->
          <div class="status-card">
            <div class="gh-eyebrow" style="margin-bottom:11px">XRAY PROCESS</div>
            <div class="proc-row">
              <span class="status-dot" :class="status.running ? 'on' : 'off'"></span>
              <div style="min-width:0">
                <div class="proc-label" x-text="runLabel"></div>
                <div class="proc-sub" x-text="processSubText"></div>
              </div>
              <span class="proc-pid" x-show="status.running && status.pid" x-text="'pid ' + status.pid"></span>
            </div>
            <p class="proc-hint">Start and stop the core from the bar below — it's available on every tab.</p>
          </div>

          <!-- active proxy -->
          <div class="status-card">
            <div class="gh-eyebrow" style="margin-bottom:10px">ACTIVE PROXY</div>
            <template x-if="activeProxy">
              <div class="active-proxy-row">
                <span class="active-proxy-icon"><i data-lucide="shield-check" class="icon"></i></span>
                <div style="min-width:0">
                  <div class="active-proxy-name" x-text="activeProxy.name"></div>
                  <div class="active-proxy-endpoint" x-text="endpoint(activeProxy)"></div>
                </div>
              </div>
            </template>
            <div x-show="!activeProxy" style="color:var(--text-muted);font-size:14px">No proxy selected yet.</div>
          </div>

          <!-- ports -->
          <div class="ports-card">
            <div class="gh-eyebrow" style="margin:12px 0 2px">LOCAL PORTS</div>
            <div class="port-row divider">
              <div>
                <div class="port-name">SOCKS5</div>
                <div class="port-host">127.0.0.1</div>
              </div>
              <button class="copy-btn" @click="copyPort(status.socksPort)">
                <span x-text="status.socksPort"></span><i data-lucide="copy" class="icon"></i>
              </button>
            </div>
            <div class="port-row">
              <div>
                <div class="port-name">HTTP</div>
                <div class="port-host">127.0.0.1</div>
              </div>
              <button class="copy-btn" @click="copyPort(status.httpPort)">
                <span x-text="status.httpPort"></span><i data-lucide="copy" class="icon"></i>
              </button>
            </div>
          </div>

          <!-- DNS config -->
          <div class="status-card dns-card">
            <div class="dns-head">
              <div class="gh-eyebrow">DNS RESOLVERS</div>
              <button class="dns-edit-btn" x-show="!dnsEditing" @click="startEditDNS()">
                <i data-lucide="pencil" class="icon"></i> Edit
              </button>
            </div>

            <!-- view mode -->
            <template x-if="!dnsEditing">
              <div>
                <div class="dns-list" x-show="dns.servers.length">
                  <template x-for="(s, i) in dns.servers" :key="i">
                    <span class="dns-chip"><i data-lucide="globe" class="icon"></i><span x-text="s"></span></span>
                  </template>
                </div>
                <div class="dns-empty" x-show="!dns.servers.length">No DNS servers configured.</div>
                <p class="dns-hint">Used by xray to resolve domains. Changes restart the core if it's running.</p>
              </div>
            </template>

            <!-- edit mode -->
            <template x-if="dnsEditing">
              <div>
                <div class="dns-rows">
                  <template x-for="(s, i) in dnsDraft" :key="i">
                    <div class="dns-row">
                      <div class="field-box">
                        <span class="icon-left"><i data-lucide="globe" class="icon"></i></span>
                        <input class="field-input" placeholder="1.1.1.1 or https://1.1.1.1/dns-query"
                               x-model="dnsDraft[i]" @keydown.enter="saveDNS()">
                      </div>
                      <button class="dns-row-del" aria-label="Remove" @click="removeDNSRow(i)">
                        <i data-lucide="x" class="icon"></i>
                      </button>
                    </div>
                  </template>
                </div>
                <button class="dns-add" @click="addDNSRow()">
                  <i data-lucide="plus" class="icon"></i> Add server
                </button>
                <div class="dns-actions">
                  <button class="btn btn-ghost" @click="cancelEditDNS()" :disabled="dnsSaving">Cancel</button>
                  <button class="btn btn-primary" @click="saveDNS()" :disabled="dnsSaving">
                    <span class="spinner" x-show="dnsSaving" style="width:14px;height:14px"></span>
                    <span x-text="dnsSaving ? 'Saving…' : 'Save DNS'"></span>
                  </button>
                </div>
              </div>
            </template>
          </div>

          <!-- log feed -->
          <div class="log-head">
            <div class="gh-eyebrow">LIVE LOG</div>
            <button class="log-clear" @click="clearLogs()">Clear</button>
          </div>
          <pre x-ref="logFeed" class="log-feed xscroll" x-text="logsText"></pre>
        </div>

      </div>

      <!-- dock: global core controls + bottom nav -->
      <div class="dock">

        <!-- global xray core controls (always visible) -->
        <div class="core-bar" :class="status.running ? 'is-running' : 'is-stopped'">
          <div class="core-state">
            <span class="core-dot"></span>
            <div style="min-width:0">
              <div class="core-label" x-text="runLabel"></div>
              <div class="core-sub" x-text="coreBarSub"></div>
            </div>
          </div>
          <div class="core-actions">
            <button class="core-btn core-restart" x-show="status.running" @click="restartXray()" aria-label="Restart Xray">
              <i data-lucide="rotate-cw" class="icon"></i>
            </button>
            <button class="core-btn core-stop" x-show="status.running" @click="stopXray()">
              <i data-lucide="square" class="icon"></i> Stop
            </button>
            <button class="core-btn core-start" x-show="!status.running" @click="startXray()" :disabled="!status.binaryOk">
              <i data-lucide="play" class="icon"></i> Start
            </button>
          </div>
        </div>

        <!-- bottom nav -->
        <nav class="bottom-nav">
          <button class="nav-item" :class="{ active: tab==='proxies' }" @click="tab='proxies'">
            <span class="nav-icon"><i data-lucide="list" class="icon"></i></span>
            <span class="nav-label">Proxies</span>
          </button>
          <button class="nav-item" :class="{ active: tab==='subs' }" @click="tab='subs'">
            <span class="nav-icon"><i data-lucide="rss" class="icon"></i></span>
            <span class="nav-label">Subs</span>
          </button>
          <button class="nav-item" :class="{ active: tab==='test' }" @click="tab='test'">
            <span class="nav-icon"><i data-lucide="gauge" class="icon"></i></span>
            <span class="nav-label">Test</span>
          </button>
          <button class="nav-item" :class="{ active: tab==='routing' }" @click="tab='routing'">
            <span class="nav-icon"><i data-lucide="git-branch" class="icon"></i></span>
            <span class="nav-label">Routes</span>
          </button>
          <button class="nav-item" :class="{ active: tab==='status' }" @click="tab='status'">
            <span class="nav-icon"><i data-lucide="activity" class="icon"></i></span>
            <span class="nav-label">Status</span>
          </button>
        </nav>
      </div>

      <!-- toasts -->
      <div class="toast-stack">
        <template x-for="t in toasts" :key="t.id">
          <div class="toast-wrap">
            <div class="toast" role="status">
              <span class="toast-icon" :class="t.tone || 'default'"><i :data-lucide="toastIcon(t.tone)" class="icon"></i></span>
              <div class="toast-body">
                <div class="toast-title" x-show="!!t.title" x-text="t.title"></div>
                <div class="toast-message" x-show="!!t.message" x-text="t.message"></div>
              </div>
              <button class="toast-close" aria-label="Dismiss" @click="dismissToast(t.id)">
                <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 3 L11 11 M11 3 L3 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              </button>
            </div>
          </div>
        </template>
      </div>

    </div>
  </template>

  <!-- ============ MODALS ============ -->
  <template x-if="modal === 'addProxy'">
    <div class="modal-scrim bottom" @click="closeModal()">
      <div class="modal-sheet" @click.stop>
        <h3 class="modal-title">Add a proxy</h3>
        <p class="modal-sub">Paste a <code>vmess://</code>, <code>vless://</code>, <code>trojan://</code>, <code>ss://</code> or <code>hy2://</code> link.</p>
        <textarea class="textarea" rows="3" placeholder="vmess://eyJ2IjoiMiIsInBzIjoi..." x-model="newProxyUrl"></textarea>
        <div class="modal-actions">
          <button class="btn btn-ghost" @click="closeModal()">Cancel</button>
          <button class="btn btn-primary" @click="confirmAddProxy()">Add proxy</button>
        </div>
      </div>
    </div>
  </template>

  <template x-if="modal === 'addSub'">
    <div class="modal-scrim bottom" @click="closeModal()">
      <div class="modal-sheet" @click.stop>
        <h3 class="modal-title" style="margin-bottom:16px">Add a subscription</h3>
        <div class="field" style="margin-bottom:14px">
          <label class="field-label" for="subName">Name</label>
          <div class="field-box"><input id="subName" class="field-input" placeholder="e.g. Main provider" x-model="newSubName"></div>
        </div>
        <div class="field">
          <label class="field-label" for="subUrl">Subscription URL</label>
          <div class="field-box"><input id="subUrl" class="field-input" placeholder="https://..." x-model="newSubUrl"></div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" @click="closeModal()">Cancel</button>
          <button class="btn btn-primary" @click="confirmAddSub()">Add</button>
        </div>
      </div>
    </div>
  </template>

  <template x-if="delSub">
    <div class="modal-scrim center" @click="closeModal()">
      <div class="modal-dialog" @click.stop>
        <h3 class="modal-title" x-text="'Delete “' + delSub.name + '”?'"></h3>
        <p class="modal-sub" x-text="(delSub.count || 0) + ' proxies came from this subscription. What should happen to them?'"></p>
        <div class="modal-stack">
          <button class="row-btn row-btn-secondary" @click="deleteSub(true)">Keep the proxies</button>
          <button class="row-btn row-btn-danger" @click="deleteSub(false)">Delete subscription &amp; its proxies</button>
          <button class="modal-cancel" @click="closeModal()">Cancel</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Add/Edit Routing Rule Modal -->
  <template x-if="modal === 'ruleForm'">
    <div class="modal-scrim bottom" @click="closeModal()">
      <div class="modal-sheet" @click.stop>
        <h3 class="modal-title" x-text="editingRuleId ? 'Edit Rule' : 'Add Routing Rule'"></h3>
        <p class="modal-sub">Route specific traffic to direct, proxy, or block.</p>

        <div class="field" style="margin-bottom:12px">
          <label class="field-label">Name</label>
          <div class="field-box">
            <input class="field-input" placeholder="e.g. Iran Direct" x-model="ruleForm.name">
          </div>
        </div>

        <div class="field" style="margin-bottom:12px">
          <label class="field-label">Condition Type</label>
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
              <input type="radio" name="type" value="domain" x-model="ruleForm.type" style="cursor:pointer"> Domains
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
              <input type="radio" name="type" value="ip" x-model="ruleForm.type" style="cursor:pointer"> IPs
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
              <input type="radio" name="type" value="geoip" x-model="ruleForm.type" style="cursor:pointer"> GeoIP
            </label>
          </div>
          <textarea class="textarea" placeholder="One per line, e.g.:&#10;google.com&#10;geoip:ir" rows="4" x-model="ruleForm.condition"></textarea>
          <p style="margin:6px 0 0;font-size:12px;color:#666">Format: domain names, IPs/CIDR, or geoip:XX</p>
        </div>

        <div class="field" style="margin-bottom:12px">
          <label class="field-label">Action</label>
          <div style="display:flex;gap:12px">
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;flex:1">
              <input type="radio" name="action" value="direct" x-model="ruleForm.action" style="cursor:pointer">
              <span style="font-weight:500;color:#00a82e">→ Direct</span>
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;flex:1">
              <input type="radio" name="action" value="proxy" x-model="ruleForm.action" style="cursor:pointer">
              <span style="font-weight:500;color:#0066ff">→ Proxy</span>
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;flex:1">
              <input type="radio" name="action" value="block" x-model="ruleForm.action" style="cursor:pointer">
              <span style="font-weight:500;color:#cc0000">→ Block</span>
            </label>
          </div>
        </div>

        <div class="field" style="margin-bottom:12px">
          <label class="field-label">Priority</label>
          <div class="field-box">
            <input type="number" class="field-input" placeholder="0" x-model.number="ruleForm.priority">
          </div>
          <p style="margin:6px 0 0;font-size:12px;color:#666">Lower number = earlier evaluation</p>
        </div>

        <div class="modal-actions">
          <button class="btn btn-ghost" @click="closeModal()">Cancel</button>
          <button class="btn btn-primary" @click="saveRule()">Save Rule</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Templates Modal -->
  <template x-if="modal === 'templates'">
    <div class="modal-scrim bottom" @click="closeModal()">
      <div class="modal-sheet" @click.stop>
        <h3 class="modal-title">Rule Templates</h3>
        <p class="modal-sub">Choose a template to get started quickly.</p>
        <div class="templates-list">
          <button class="template-card" @click="loadTemplate('iran_direct')">
            <div class="template-name">Iran IPs Direct</div>
            <div class="template-desc">geoip:ir → direct</div>
          </button>
          <button class="template-card" @click="loadTemplate('block_ads')">
            <div class="template-name">Block Ads &amp; Trackers</div>
            <div class="template-desc">Common ad domains → block</div>
          </button>
          <button class="template-card" @click="loadTemplate('us_proxy')">
            <div class="template-name">US Streaming via Proxy</div>
            <div class="template-desc">geoip:us → proxy</div>
          </button>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost btn-full" @click="closeModal()">Cancel</button>
        </div>
      </div>
    </div>
  </template>

</div>
</body>
</html>
